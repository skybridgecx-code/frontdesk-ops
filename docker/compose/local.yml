services:
  postgres:
    image: postgres:16-alpine
    container_name: frontdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: frontdesk
      POSTGRES_USER: frontdesk
      POSTGRES_PASSWORD: frontdesk
    ports:
      - "5433:5432"
    volumes:
      - frontdesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontdesk -d frontdesk"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: frontdesk-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://frontdesk:frontdesk@postgres:5432/frontdesk?schema=public
      FRONTDESK_API_PUBLIC_URL: http://localhost:3001
      FRONTDESK_WEB_URL: http://localhost:3000
      FRONTDESK_INTERNAL_API_SECRET: local-dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      OPS_USER: ${OPS_USER:-admin}
      OPS_PASS: ${OPS_PASS:-admin}
    depends_on:
      postgres:
        condition: service_healthy

  realtime-gateway:
    build:
      context: ../..
      dockerfile: apps/realtime-gateway/Dockerfile
    container_name: frontdesk-realtime-gateway
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: postgresql://frontdesk:frontdesk@postgres:5432/frontdesk?schema=public
      FRONTDESK_INTERNAL_API_SECRET: local-dev-secret-change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_TRANSCRIPTION_MODEL: gpt-4o-mini-transcribe
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  frontdesk_postgres_data:
