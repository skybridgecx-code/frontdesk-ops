services:
  postgres:
    image: postgres:16-alpine
    container_name: frontdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: frontdesk
      POSTGRES_USER: frontdesk
      POSTGRES_PASSWORD: frontdesk
    ports:
      - "5433:5432"
    volumes:
      - frontdesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontdesk -d frontdesk"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: frontdesk-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - frontdesk_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  frontdesk_postgres_data:
  frontdesk_redis_data:
